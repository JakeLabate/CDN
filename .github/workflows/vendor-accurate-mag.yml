name: vendor-accurate-mag
on: workflow_dispatch
permissions:
  contents: write
jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p accurate-mag
          curl -fsSL -o accurate-mag/logo-main.png "https://accurate-mag.com/wp-content/uploads/2018/02/Accurate-Mag-logo-main80.png"
          curl -fsSL -o accurate-mag/logo-white.png "https://accurate-mag.com/wp-content/uploads/2018/02/accurate-mag-White-sticky.png"
          curl -fsSL -o accurate-mag/logo-mobile.png "https://accurate-mag.com/wp-content/uploads/2018/02/accu-mag-mobile-logo.png" || true
          curl -fsSL -o accurate-mag/yellow-paint.png "https://accurate-mag.com/wp-content/uploads/2018/02/yellow-paint.png" || true
          curl -fsSL -o accurate-mag/favicon.ico "https://accurate-mag.com/favicon.ico" || true
      - run: |
          git config user.name "vendor-bot"
          git config user.email "vendor@users.noreply.github.com"
          git add accurate-mag
          git commit -m "Vendor Accurate-Mag brand assets" || echo "nothing to commit"
          git push
